syntax = "proto3";

package nodeinfo;

option go_package = "github.com/JupiterMetaLabs/JMDN-FastSync/internal/proto/nodeinfo;nodeinfopb";

message NodeInfo {

  bytes peer_id = 1;

  repeated bytes multiaddrs = 2;

  repeated string capabilities = 3;

  bytes public_key = 4;

  uint32 version = 5;

  string protocol = 6; 
}