syntax = "proto3";

package priorsync;

option go_package = "github.com/JupiterMetaLabs/JMDN-FastSync/internal/proto/priorsync";
import "nodeinfo/nodeinfo.proto";
import "ack/ack.proto";
import "phase/phase.proto";
import "merkle/merkle.proto";

message PriorSync {
    uint64 blocknumber = 1;
    bytes stateroot = 2;
    bytes blockhash = 3;
    Metadata metadata = 4;
    merkle.MerkleSnapshot merklesnapshot = 5;
    merkle.range range = 6;
}

message Metadata {
    bytes checksum = 1;
    uint32 version = 3;
    nodeinfo.NodeInfo nodeinfo = 4;
}

message PriorSyncMessage{
    PriorSync priorsync = 1;
    ack.Ack ack = 2;
    phase.Phase phase = 3;
}

message StreamMessage {
    oneof payload {
        PriorSyncMessage prior_sync = 1;
        merkle.MerkleMessage merkle = 2;
        merkle.MerkleRequestMessage merkle_req = 3;
    }
}