syntax = "proto3";

package accounts;

option go_package = "github.com/JupiterMetaLabs/JMDN-FastSync/common/proto/accounts";

import "google/protobuf/struct.proto";
import "ack/ack.proto";
import "phase/phase.proto";
import "tagging/tag.proto";
// ================================================================
// Account record
// ================================================================

// Account is the persisted account record (mirrors types.Account in common/types/Block.go).
message Account {
    // Legacy DID fields (for backward compatibility)
    string did_address = 1;

    // New PublicKey-based fields; 20-byte Ethereum-style address (derived from PublicKey)
    bytes address = 2;

    // balance is always "0" when transferred during AccountSync.
    // Actual balance is computed later by the Reconciliation phase.
    string balance = 3;

    uint64 nonce = 4;

    // Account metadata
    string account_type = 5; // "did" or "publickey"
    int64 created_at = 6;
    int64 updated_at = 7;

    // Optional arbitrary metadata (maps from map[string]interface{} on the wire)
    google.protobuf.Struct metadata = 8;
}


// ================================================================
// AccountSync wire protocol
// ================================================================

// AccountNonceSyncRequest is one frame of the client→server upload stream.
// The client sends multiple requests sequentially, one per ART chunk.
// Each chunk covers at most MAX_ACCOUNT_NONCES keys.
//
// Frame structure (from architecture):
//   ART        — zstd-compressed ART of nonces the client already has
//   TotalKeys  — client's full account count (lets server know how many batches to expect)
//   KeysRange  — nonce range this chunk covers (enables O(1) segment routing on server)
//   Checksum   — integrity verification of the ART bytes
//   Phase      — phase information
message AccountNonceSyncRequest {
    bytes      art         = 1; // zstd-compressed ART chunk (art.Encode output)
    uint64     total_keys  = 2; // client's total account count across ALL chunks
    tagging.RangeTag keys_range  = 3; // nonce range [start, end] for this chunk
    bytes      checksum    = 4; // integrity checksum of the art bytes
    uint32     batch_index = 5; // 0-indexed sequence number
    bool       is_last     = 6; // true on the final batch — server starts diff computation after this
    phase.Phase phase      = 7; // phase information
}

// ================================================================
// Server-side stream envelope (server → client)
// ================================================================

// AccountBatchAck acknowledges receipt of one ART batch.
// Client waits for this before sending the next batch.
message AccountBatchAck {
    uint32  batch_index = 1;
    ack.Ack ack         = 2;
}

// AccountSyncHeartbeat is sent by the server during the diff computation gap
// (between the last AccountBatchAck and the first AccountSyncResponse page)
// to keep the stream alive when the server is scanning a large account set.
message AccountSyncHeartbeat {
    int64 timestamp = 1; // Unix nanoseconds — for observability only
}

// AccountSyncResponse carries one page of accounts the client is missing.
// Pages are sent in parallel — this message carries NO completion signal.
// Do NOT use the absence of more messages to infer completion; wait for
// AccountSyncEndOfStream instead.
// Client writes each received account with balance="0"; Reconciliation fills
// in actual balances later for accounts that had transactions.
message AccountSyncResponse {
    repeated Account accounts   = 1; // accounts client does not have
    uint32           page_index = 2; // page index for reordering out-of-order arrivals
    ack.Ack          ack        = 3;
    phase.Phase      phase      = 4;
}

// AccountSyncEndOfStream is sent by the server exactly once, sequentially,
// after ALL parallel AccountSyncResponse pages have been fully dispatched
// (server waits on a WaitGroup for all page goroutines before sending this).
//
// This is the only reliable completion signal. Because response pages arrive
// out of order, a has_more=false flag on a response page could arrive before
// other in-transit pages — causing the client to stop reading and lose data.
// Sending this as a sequential message after all pages guarantees it always
// arrives last.
//
// Client reads AccountSyncResponse frames freely until this message arrives.
// Use total_pages to verify no pages were lost:
//   received_pages != total_pages → a page was dropped, trigger a retry.
message AccountSyncEndOfStream {
    uint32      total_pages    = 1; // total AccountSyncResponse pages dispatched
    uint64      total_accounts = 2; // total missing accounts transferred across all pages
    ack.Ack     ack            = 3;
    phase.Phase phase          = 4;
}

// AccountSyncServerMessage is the wire envelope for all server→client frames.
// The server sends messages in this sequence:
//   1. N × AccountBatchAck      — one per received ART batch (sequential)
//   2. M × AccountSyncHeartbeat — during diff computation gap (sequential, if needed)
//   3. P × AccountSyncResponse  — missing account pages (parallel)
//   4. 1 × AccountSyncEndOfStream — sent sequentially after all P pages complete
message AccountSyncServerMessage {
    oneof payload {
        AccountBatchAck        batch_ack = 1;
        AccountSyncHeartbeat   heartbeat = 2;
        AccountSyncResponse    response  = 3;
        AccountSyncEndOfStream end       = 4;
    }
}
