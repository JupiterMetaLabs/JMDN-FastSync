syntax = "proto3";

package block;

option go_package = "github.com/JupiterMetaLabs/JMDN-FastSync/common/proto/block";

message Header {
    string proof_hash = 1;
    string status = 2;
    string txns_root = 3;
    int64 timestamp = 4;
    string extra_data = 5;
    bytes state_root = 6;
    bytes coinbase_addr = 7;
    bytes zkvm_addr = 8;
    bytes prev_hash = 9;
    bytes block_hash = 10;
    uint64 gas_limit = 11;
    uint64 gas_used = 12;
    uint64 block_number = 13;
    bytes logs_bloom = 14;
}

message Transaction {
    bytes hash = 1;
    bytes from = 2;
    bytes to = 3;
    bytes value = 4; // big.Int
    uint32 type = 5; // uint8
    uint64 timestamp = 6;
    bytes chain_id = 7; // big.Int
    uint64 nonce = 8;
    uint64 gas_limit = 9;
    bytes gas_price = 10; // big.Int
    bytes max_fee = 11; // big.Int
    bytes max_priority_fee = 12; // big.Int
    bytes data = 13;
    
    repeated AccessTuple access_list = 14;

    bytes v = 15; // big.Int
    bytes r = 16; // big.Int
    bytes s = 17; // big.Int
}

message AccessTuple {
    bytes address = 1;
    repeated bytes storage_keys = 2;
}

message ZKBlock {
    bytes stark_proof = 1;
    repeated uint32 commitment = 2;
    string proof_hash = 3;
    string status = 4;
    string txns_root = 5;
    repeated Transaction transactions = 6;
    int64 timestamp = 7;
    string extra_data = 8;
    bytes state_root = 9;
    bytes logs_bloom = 10;
    bytes coinbase_addr = 11;
    bytes zkvm_addr = 12;
    bytes prev_hash = 13;
    bytes block_hash = 14;
    uint64 gas_limit = 15;
    uint64 gas_used = 16;
    uint64 block_number = 17;
}
