syntax = "proto3";

package pots;

option go_package = "github.com/JupiterMetaLabs/JMDN-FastSync/common/proto/pots";

import "tagging/tag.proto";
import "phase/phase.proto";

/*
pots request message
- map{blocknumber: blockhash}
- pots_timestamp
- Auth
*/
message PoTSRequest{
    map<uint64, bytes> blocks = 1;
    uint64 latest_block_number = 2;
    phase.Phase phase = 3;
}

// This response have the tags of blocks which are missing in the map and beyond that timestamp
// for example if 20 blocks is synced after that timestamp, and the map have 18 blocks remaining 2 blocks would be sent in tagging. 
// then that tagging will be given to headersync and data sync eventually. 
message PoTSResponse{
    tagging.Tag tag = 1;
    uint64 latest_block_number = 2;  // Optional: server's latest known block
    phase.Phase phase = 3;
}

// Heartbeat is sent periodically by Node 1 during computation to keep the stream alive.
message PoTSHeartbeat {
    int64 timestamp = 1; // Unix nanoseconds — for observability only
}

message PoTSStreamMessage {
    oneof payload {
        PoTSResponse response = 1;
        PoTSHeartbeat heartbeat = 2;
    }
}