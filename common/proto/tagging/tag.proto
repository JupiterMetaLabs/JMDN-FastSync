syntax = "proto3";

package tagging;
option go_package = "github.com/JupiterMetaLabs/JMDN-FastSync/common/proto/tagging";

// in the version 1 we are just taging the numbers
// in the version 2 we can tag both numbers and range also
message Tag {
	repeated uint64 block_number = 1;
    repeated RangeTag range = 2;
}

message RangeTag {
	uint64 start = 1;
	uint64 end = 2;
}

message TaggedAccounts {
	// map<string, bool> is mapping the account address to a boolean flag
	map<string, bool> accounts = 1;
}
