syntax = "proto3";

package priorsync;

option go_package = "github.com/JupiterMetaLabs/JMDN-FastSync/common/proto/priorsync";
import "nodeinfo/nodeinfo.proto";
import "ack/ack.proto";
import "phase/phase.proto";
import "merkle/merkle.proto";
import "headersync/headersync.proto";

message PriorSync {
    uint64 blocknumber = 1;
    bytes stateroot = 2;
    bytes blockhash = 3;
    Metadata metadata = 4;
    merkle.MerkleSnapshot merklesnapshot = 5;
    merkle.range range = 6;
}

message Metadata {
    bytes checksum = 1;
    uint32 version = 3;
    nodeinfo.NodeInfo nodeinfo = 4;
}

message PriorSyncMessage{
    PriorSync priorsync = 1;
    ack.Ack ack = 2;
    phase.Phase phase = 3;
    headersync.HeaderSyncRequest headersync = 4;
}

// Heartbeat is sent periodically by Node 1 during computation to keep the stream alive.
message Heartbeat {
    int64 timestamp = 1; // Unix nanoseconds — for observability only
}

// StreamMessage is the wire envelope for the PriorSync stream.
// Node 1 sends N heartbeats followed by exactly one final response.
message StreamMessage {
    oneof payload {
        Heartbeat         heartbeat = 1;
        PriorSyncMessage  response  = 2;
    }
}
