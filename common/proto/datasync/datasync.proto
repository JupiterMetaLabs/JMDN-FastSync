syntax = "proto3";

package datasync;

option go_package = "github.com/JupiterMetaLabs/JMDN-FastSync/common/proto/datasync";

import "ack/ack.proto";
import "phase/phase.proto";
import "block/block_nonheader.proto";
import "tagging/tag.proto";

// ================================================================
// Request / Response envelopes (mirror headersync pattern)
// ================================================================

message DataSyncRequest {
    tagging.Tag  tag     = 1; // blocks being requested (ranges or individual)
    uint32       version = 2;
    ack.Ack      ack     = 3;
    phase.Phase  phase   = 4;
}

message DataSyncResponse {
    repeated block.NonHeaders data    = 1;
    uint32                    version = 2;
    tagging.TaggedAccounts    taggedaccounts = 3;
    ack.Ack                   ack     = 4;
    phase.Phase               phase   = 5;
}

// Heartbeat is sent periodically by Node 1 during computation to keep the stream alive.
message DataSyncHeartbeat {
    int64 timestamp = 1; // Unix nanoseconds — for observability only
}

// StreamMessage is the wire envelope for the DataSync stream.
// Node 1 sends N heartbeats followed by exactly one final response.
message DataSyncStreamMessage {
    oneof payload {
        DataSyncHeartbeat heartbeat = 1;
        DataSyncResponse  response  = 2;
    }
}
